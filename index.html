<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال فيش | طعم الملوك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #000000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            font-family: 'Cairo', sans-serif; background-color: var(--dark);
            /* الصورة كخلفية ثابتة للموقع */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('main-logo.png.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        header { text-align: center; padding: 40px 10px; }

        /* الصورة كلوجو في قمة الصفحة */
        .brand-header-img {
            width: 85%;
            max-width: 600px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            border: 2px solid var(--gold);
            transition: transform 0.3s ease;
        }

        .brand-header-img:hover { transform: scale(1.02); }

        .section-title { 
            font-size: clamp(1.8rem, 5vw, 2.5rem); 
            text-align: center; color: var(--gold); 
            margin: 30px 0; 
            text-shadow: 2px 2px 10px #000;
        }

        .categories { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; max-width: 1100px; margin: 0 auto; padding: 20px;
            padding-bottom: 60px;
        }

        .category-link { text-decoration: none; color: inherit; }

        .card {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            text-align: center;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--gold); 
            background: rgba(212, 175, 55, 0.1); 
        }

        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card h3 { margin: 15px; font-size: 1.5rem; text-shadow: 1px 1px 5px #000; }

        @media (max-width: 480px) {
            .brand-header-img { width: 95%; }
        }
    </style>
</head>
<body>

    <header>
        <img src="main-logo.png.PNG" alt="Royal Fish" class="brand-header-img">
    </header>

    <h2 class="section-title">قائمة الملوك</h2>
    
    <div class="categories">
        <a href="shrimp.html" class="category-link">
            <div class="card">
                <img src="shrimp.png.jpeg" alt="جمبري">
                <h3>قسم الجمبري</h3>
            </div>
        </a>
        <a href="tilapia.html" class="category-link">
            <div class="card">
                <img src="tilapia.png.jpeg" alt="بلطي">
                <h3>أسماك النيل</h3>
            </div>
        </a>
        <a href="sea-fish.html" class="category-link">
            <div class="card">
                <img src="sea-fish.png.jpeg" alt="سمك بحر">
                <h3>كنوز البحر</h3>
            </div>
        </a>
        <a href="platters.html" class="category-link">
            <div class="card">
                <img src="platters.png.jpeg" alt="صواني">
                <h3>الولائم الملكية</h3>
            </div>
        </a>
    </div>

</body>
</html>
