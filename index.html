<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال فيش | المتجر الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #000000; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: var(--dark);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('main-logo.png.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; overflow-x: hidden; scroll-behavior: smooth;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold);
        }
        .menu-btn, .nav-icons i { font-size: 1.4rem; color: var(--gold); cursor: pointer; position: relative; }
        .badge { background: #ff4757; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; position: absolute; top: -10px; right: -10px; }

        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 2000; transition: 0.4s; padding: 20px;
            border-left: 2px solid var(--gold);
        }
        .sidebar.active { right: 0; }
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.98); padding: 25px; border-radius: 20px;
            border: 2px solid var(--gold); z-index: 3000; width: 95%; max-width: 500px;
            display: none; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px rgba(212,175,55,0.3);
        }
        .modal.active { display: block; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass); }
        .cart-item button { background: #ff4757; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        header { text-align: center; padding: 40px 10px; }
        .brand-img { width: 90%; max-width: 500px; border-radius: 15px; border: 1px solid var(--gold); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .section-title { text-align: center; color: var(--gold); font-size: 2rem; margin-bottom: 30px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-body { padding: 15px; }

        select { width: 100%; padding: 8px; margin: 10px 0; background: #1a1a1a; color: white; border: 1px solid var(--gold); border-radius: 5px; }
        .btn-buy { width: 100%; background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-whatsapp { width: 100%; background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="modal" id="cartModal">
        <div class="modal-header"><h3>🛒 السلة الملكية</h3><i class="fas fa-times" onclick="closeAll()" style="cursor:pointer"></i></div>
        <div id="cartContent">السلة فارغة حالياً..</div>
        <div id="cartFooter" style="display:none; margin-top:20px;">
            <button class="btn-whatsapp" onclick="sendOrder()">تأكيد الطلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>

    <div class="modal" id="favModal">
        <div class="modal-header"><h3>❤️ المفضلة</h3><i class="fas fa-times" onclick="closeAll()" style="cursor:pointer"></i></div>
        <div id="favContent">قائمة المفضلة فارغة..</div>
    </div>

    <div class="modal" id="loginModal">
        <h2 style="color:var(--gold)">تسجيل دخول</h2>
        <input type="text" id="userName" style="width:100%; padding:12px; margin:10px 0;" placeholder="الاسم الكريم">
        <input type="tel" id="userPhone" style="width:100%; padding:12px; margin:10px 0;" placeholder="رقم الهاتف">
        <button class="btn-buy" onclick="saveLogin()">دخول ملكي</button>
    </div>

    <nav class="navbar">
        <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
        <div onclick="showPage('home')" style="cursor:pointer; font-weight:900; color:var(--gold); font-size:1.4rem;">ROYAL FISH</div>
        <div class="nav-icons">
            <i class="fas fa-heart" onclick="openModal('favModal')"><span class="badge" id="fav-badge">0</span></i>
            <i class="fas fa-shopping-cart" onclick="openModal('cartModal')" style="margin-right:20px;"><span class="badge" id="cart-badge">0</span></i>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <h2 id="userWelcome">القائمة</h2>
        <ul class="sidebar-menu">
            <li onclick="showPage('home')">الرئيسية</li>
            <li id="loginMenuItem" onclick="openModal('loginModal')">تسجيل الدخول</li>
            <hr>
            <li onclick="showPage('shrimp')">الجمبري والكابوريا</li>
            <li onclick="showPage('nile')">أسماك النيل</li>
            <li onclick="showPage('sea')">سمك البحر</li>
            <li onclick="showPage('platters')">الصواني والولائم</li>
        </ul>
    </div>

    <div id="home" class="page active">
        <header><img src="main-logo.png.PNG" class="brand-img"></header>
        <div class="container"><div class="grid">
            <div class="card" onclick="showPage('shrimp')"><img src="shrimp.png.jpeg"><h3>الجمبري والكابوريا</h3></div>
            <div class="card" onclick="showPage('nile')"><img src="tilapia.png.jpeg"><h3>أسماك النيل</h3></div>
            <div class="card" onclick="showPage('sea')"><img src="sea-fish.png.jpeg"><h3>سمك البحر</h3></div>
            <div class="card" onclick="showPage('platters')"><img src="platters.png.jpeg"><h3>الصواني الملكية</h3></div>
        </div></div>
    </div>

    <div id="category-page" class="page">
        <div class="container">
            <button onclick="showPage('home')" style="color:var(--gold); background:none; border:1px solid var(--gold); padding:5px 15px; cursor:pointer; border-radius:5px">← عودة</button>
            <h2 id="cat-title" class="section-title"></h2>
            <div id="product-grid" class="grid"></div>
        </div>
    </div>

    <script>
        // قاعدة بيانات المنتجات مع الصور المخصصة
        const data = {
            shrimp: {
                title: "الجمبري والكابوريا",
                items: [
                    { name: "جمبري جامبو كبير", img: "shrimp.png.jpeg" },
                    { name: "جمبري جامبو وسط", img: "shrimp.png.jpeg" },
                    { name: "جمبري أبيض", img: "shrimp.png.jpeg" },
                    { name: "جمبري قزازي", img: "shrimp.png.jpeg" },
                    { name: "جمبري سركوس", img: "shrimp.png.jpeg" },
                    { name: "كابوريا نتاية", img: "shrimp.png.jpeg" },
                    { name: "كابوريا ذكر", img: "shrimp.png.jpeg" }
                ]
            },
            nile: {
                title: "أسماك النيل",
                items: [
                    { name: "بلطي كبير", img: "tilapia.png.jpeg" },
                    { name: "بلطي وسط", img: "tilapia.png.jpeg" },
                    { name: "بوري", img: "tilapia.png.jpeg" },
                    { name: "طوبار", img: "tilapia.png.jpeg" },
                    { name: "جمبري نيل", img: "tilapia.png.jpeg" }
                ]
            },
            sea: {
                title: "سمك البحر",
                items: [
                    { name: "سمك شك", img: "sea-fish.png.jpeg" },
                    { name: "سمك باغه", img: "sea-fish.png.jpeg" },
                    { name: "مرجان", img: "sea-fish.png.jpeg" },
                    { name: "سردين", img: "sea-fish.png.jpeg" },
                    { name: "بساريه", img: "sea-fish.png.jpeg" }
                ]
            },
            platters: {
                title: "الصواني والولائم",
                items: [
                    { name: "صينية عزومة ملكية", img: "platters.png.jpeg" },
                    { name: "تشكيلة رويال فسفور", img: "platters.png.jpeg" },
                    { name: "صينية السعادة مشكل", img: "platters.png.jpeg" }
                ]
            }
        };

        // الذاكرة الدائمة: جلب البيانات المخزنة برقم الهاتف
        let cart = JSON.parse(localStorage.getItem('royalCart')) || [];
        let favorites = JSON.parse(localStorage.getItem('royalFav')) || [];

        function saveToStorage() {
            localStorage.setItem('royalCart', JSON.stringify(cart));
            localStorage.setItem('royalFav', JSON.stringify(favorites));
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function openModal(id) { closeAll(); document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); renderCart(); renderFav(); }
        function closeAll() { document.querySelectorAll('.modal, .sidebar, .overlay').forEach(el => el.classList.remove('active')); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            closeAll();
            if (data[pageId]) {
                document.getElementById('cat-title').innerText = data[pageId].title;
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                data[pageId].items.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${item.img}">
                            <div class="card-body">
                                <h3>${item.name}</h3>
                                <select id="clean-${item.name}"><option>سنجاري</option><option>قشر وبطن</option><option>بدون تنظيف</option></select>
                                <button class="btn-buy" onclick="addToCart('${item.name}')">إضافة للسلة</button>
                                <button style="background:none; border:none; color:#ff4757; cursor:pointer;" onclick="addToFav('${item.name}')"><i class="fas fa-heart"></i> للمفضلة</button>
                            </div>
                        </div>`;
                });
                document.getElementById('category-page').classList.add('active');
            } else { document.getElementById(pageId).classList.add('active'); }
        }

        function addToCart(name) {
            const cleaning = document.getElementById(`clean-${name}`).value;
            cart.push({ name, cleaning });
            saveToStorage();
            updateBadges();
            alert(`تم إضافة ${name} إلى سلتك`);
        }

        function addToFav(name) {
            if(!favorites.includes(name)) {
                favorites.push(name);
                saveToStorage();
                updateBadges();
            }
        }

        function updateBadges() {
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('fav-badge').innerText = favorites.length;
        }

        function renderCart() {
            const con = document.getElementById('cartContent');
            if(cart.length === 0) { con.innerHTML = "السلة فارغة حالياً.."; document.getElementById('cartFooter').style.display="none"; return; }
            document.getElementById('cartFooter').style.display="block";
            con.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name} (${item.cleaning})</span>
                    <button onclick="removeFromCart(${index})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function removeFromCart(index) { cart.splice(index, 1); saveToStorage(); updateBadges(); renderCart(); }

        function renderFav() {
            const con = document.getElementById('favContent');
            if(favorites.length === 0) { con.innerHTML = "قائمة المفضلة فارغة.."; return; }
            con.innerHTML = favorites.map((item, index) => `
                <div class="cart-item">
                    <span>${item}</span>
                    <button onclick="removeFromFav(${index})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function removeFromFav(index) { favorites.splice(index, 1); saveToStorage(); updateBadges(); renderFav(); }

        function saveLogin() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            if(name && phone) { 
                localStorage.setItem('royalName', name); 
                localStorage.setItem('royalPhone', phone); 
                location.reload(); 
            }
        }

        function sendOrder() {
            const name = localStorage.getItem('royalName') || "عميل جديد";
            const phone = localStorage.getItem('royalPhone') || "";
            if(!localStorage.getItem('royalPhone')) { alert("يرجى تسجيل الدخول أولاً لإرسال الطلب"); openModal('loginModal'); return; }
            
            let text = `طلب جديد من رويال فيش 👑\nالاسم: ${name}\nالهاتف: ${phone}\n\nالطلبات:\n`;
            cart.forEach(item => text += `- ${item.name} (تجهيز: ${item.cleaning})\n`);
            window.open(`https://wa.me/201006407185?text=${encodeURIComponent(text)}`);
        }

        window.onload = () => {
            const name = localStorage.getItem('royalName');
            if(name) {
                document.getElementById('userWelcome').innerText = "أهلاً، " + name;
                document.getElementById('loginMenuItem').innerText = "خروج (تبديل الحساب)";
                document.getElementById('loginMenuItem').onclick = () => { localStorage.clear(); location.reload(); };
            }
            updateBadges();
        };
    </script>
</body>
</html>
