<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال فيش | المتجر الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #000000; --glass: rgba(255, 255, 255, 0.1); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            font-family: 'Cairo', sans-serif; background-color: var(--dark);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('main-logo.png.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; overflow-x: hidden;
        }

        /* شريط التنقل العلوي */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold);
        }

        .menu-btn, .cart-btn { font-size: 1.5rem; color: var(--gold); cursor: pointer; background: none; border: none; }

        /* الشريط الجانبي (Sidebar) */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; border-left: 2px solid var(--gold);
        }

        .sidebar.active { right: 0; }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li { margin: 20px 0; }
        .sidebar-menu a { color: white; text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .sidebar-menu a:hover { color: var(--gold); padding-right: 10px; }

        /* أيقونة الإشعارات للسلة والمفضلة */
        .badge { background: red; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; vertical-align: top; margin-right: -10px; }

        header { text-align: center; padding: 30px 10px; }
        .brand-header-img { width: 80%; max-width: 500px; border-radius: 15px; border: 1px solid var(--gold); }

        .section-title { text-align: center; color: var(--gold); margin: 20px 0; font-size: 2rem; }

        .categories { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card h3 { padding: 15px; }

        /* طبقة التعتيم عند فتح القائمة */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <nav class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div style="font-weight: 900; color: var(--gold); font-size: 1.4rem;">ROYAL FISH</div>
        <div class="cart-btn">
            <i class="fas fa-heart" style="margin-left: 15px;"> <span class="badge" id="fav-count">0</span></i>
            <i class="fas fa-shopping-cart"> <span class="badge" id="cart-count">0</span></i>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="color: var(--gold); margin: 0;">القائمة</h2>
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="#"><i class="fas fa-user"></i> تسجيل الدخول</a></li>
            <li><hr style="border: 0.5px solid var(--glass);"></li>
            <li><a href="shrimp.html"><i class="fas fa-fish"></i> قسم الجمبري</a></li>
            <li><a href="tilapia.html"><i class="fas fa-fish"></i> أسماك النيل</a></li>
            <li><a href="sea-fish.html"><i class="fas fa-water"></i> كنوز البحر</a></li>
            <li><a href="platters.html"><i class="fas fa-utensils"></i> الولائم</a></li>
            <li><hr style="border: 0.5px solid var(--glass);"></li>
            <li><a href="#"><i class="fas fa-heart" style="color: #ff4757;"></i> المفضلة</a></li>
            <li><a href="#"><i class="fas fa-shopping-basket" style="color: #2ed573;"></i> سلة المشتريات</a></li>
        </ul>
    </div>

    <header>
        <img src="main-logo.png.PNG" alt="Royal Fish" class="brand-header-img">
    </header>

    <h2 class="section-title">قائمة الملوك</h2>
    
    <div class="categories">
        <a href="shrimp.html" style="text-decoration:none; color:inherit;">
            <div class="card">
                <img src="shrimp.png.jpeg" alt="جمبري">
                <h3>قسم الجمبري</h3>
            </div>
        </a>
        <a href="tilapia.html" style="text-decoration:none; color:inherit;">
            <div class="card">
                <img src="tilapia.png.jpeg" alt="بلطي">
                <h3>أسماك النيل</h3>
            </div>
        </a>
        <a href="sea-fish.html" style="text-decoration:none; color:inherit;">
            <div class="card">
                <img src="sea-fish.png.jpeg" alt="سمك بحر">
                <h3>كنوز البحر</h3>
            </div>
        </a>
        <a href="platters.html" style="text-decoration:none; color:inherit;">
            <div class="card">
                <img src="platters.png.jpeg" alt="صواني">
                <h3>الولائم الملكية</h3>
            </div>
        </a>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // إغلاق القائمة عند الضغط على التعتيم
        document.getElementById('overlay').onclick = function() {
            toggleSidebar();
        }
    </script>

</body>
</html>
