<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال فيش | المتجر الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #000000; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: var(--dark);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('main-logo.png.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; overflow-x: hidden; scroll-behavior: smooth;
        }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold); }
        .nav-icons i { font-size: 1.4rem; color: var(--gold); cursor: pointer; position: relative; }
        .badge { background: #ff4757; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; position: absolute; top: -10px; right: -10px; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.98); padding: 25px; border-radius: 20px; border: 2px solid var(--gold); z-index: 3000; width: 95%; max-width: 500px; display: none; max-height: 85vh; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; }

        .checkout-input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid var(--gold); color: white; border-radius: 8px; font-family: 'Cairo'; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .card img { width: 100%; height: 220px; object-fit: cover; }

        .btn-buy { width: 100%; background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-checkout { background: #25d366; color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="modal" id="cartModal">
        <div class="modal-header"><h3>🛒 تأكيد الطلبية</h3><i class="fas fa-times" onclick="closeAll()" style="cursor:pointer"></i></div>
        <div id="cartContent">السلة فارغة..</div>
        
        <div id="checkoutForm" style="display:none; margin-top:20px; border-top: 1px solid var(--gold); padding-top: 15px;">
            <h4 style="color:var(--gold)">بيانات التسليم:</h4>
            <input type="text" id="custName" class="checkout-input" placeholder="الاسم الكامل">
            <input type="tel" id="custPhone" class="checkout-input" placeholder="رقم الموبايل">
            <input type="text" id="custAddress" class="checkout-input" placeholder="العنوان بالتفصيل">
            <button class="btn-checkout" onclick="executePurchase()">إرسال الطلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>

    <nav class="navbar">
        <div onclick="showPage('home')" style="cursor:pointer; font-weight:900; color:var(--gold); font-size:1.4rem;">ROYAL FISH</div>
        <div class="nav-icons">
            <i class="fas fa-shopping-cart" onclick="openModal('cartModal')"><span class="badge" id="cart-badge">0</span></i>
        </div>
    </nav>

    <div id="home" class="page active">
        <header style="text-align:center; padding:40px;"><img src="main-logo.png.PNG" style="width:90%; max-width:400px; border-radius:15px; border:2px solid var(--gold);"></header>
        <div class="container" style="max-width:1200px; margin:auto; padding:20px;">
            <div class="grid">
                <div class="card" onclick="showPage('shrimp')"><img src="shrimp.png.jpeg"><h3>الجمبري والكابوريا</h3></div>
                <div class="card" onclick="showPage('nile')"><img src="tilapia.png.jpeg"><h3>أسماك النيل</h3></div>
                <div class="card" onclick="showPage('sea')"><img src="sea-fish.png.jpeg"><h3>سمك البحر</h3></div>
                <div class="card" onclick="showPage('platters')"><img src="platters.png.jpeg"><h3>الصواني الملكية</h3></div>
            </div>
        </div>
    </div>

    <div id="category-page" class="page">
        <div class="container" style="max-width:1200px; margin:auto; padding:20px;">
            <button onclick="showPage('home')" style="color:var(--gold); background:none; border:1px solid var(--gold); padding:8px 20px; cursor:pointer; border-radius:8px; margin-bottom:20px;">← العودة</button>
            <h2 id="cat-title" style="text-align:center; color:var(--gold);"></h2>
            <div id="product-grid" class="grid"></div>
        </div>
    </div>

    <script>
        const data = {
            shrimp: { title: "الجمبري والكابوريا", items: [
                {n:"جمبري جامبو كبير", i:"shrimp_jumbo_large.png"},
                {n:"جمبري جامبو وسط", i:"shrimp_jumbo_mid.png"},
                {n:"كابوريا نتاية", i:"crab_female.png"}
            ]},
            nile: { title: "أسماك النيل", items: [
                {n:"بلطي كبير", i:"bolti_large.png"},
                {n:"بوري", i:"bouri.png"}
            ]},
            sea: { title: "سمك البحر", items: [
                {n:"سمك مرجان", i:"morgan.png"},
                {n:"سردين", i:"sardin.png"}
            ]},
            platters: { title: "الصواني الملكية", items: [
                {n:"صينية عزومة ملكية", i:"plat_1.png"}
            ]}
        };

        let cart = JSON.parse(localStorage.getItem('royalCart')) || [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if (data[pageId]) {
                document.getElementById('cat-title').innerText = data[pageId].title;
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                data[pageId].items.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${item.i}" onerror="this.src='main-logo.png.PNG'">
                            <div class="card-body">
                                <h3>${item.n}</h3>
                                <select id="clean-${item.n}"><option>سنجاري</option><option>قشر وبطن</option><option>بدون تنظيف</option></select>
                                <button class="btn-buy" onclick="addToCart('${item.n}')">إضافة للسلة</button>
                            </div>
                        </div>`;
                });
                document.getElementById('category-page').classList.add('active');
            } else { document.getElementById(pageId).classList.add('active'); }
        }

        function addToCart(name) {
            const clean = document.getElementById(`clean-${name}`).value;
            cart.push({ name, clean });
            localStorage.setItem('royalCart', JSON.stringify(cart));
            updateBadges();
            alert("تمت الإضافة بنجاح ✅");
        }

        function updateBadges() { document.getElementById('cart-badge').innerText = cart.length; }
        function openModal(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); renderCart(); }
        function closeAll() { document.querySelectorAll('.modal, .overlay').forEach(el => el.classList.remove('active')); }

        function renderCart() {
            const con = document.getElementById('cartContent');
            if(cart.length === 0) { con.innerHTML = "السلة فارغة"; document.getElementById('checkoutForm').style.display="none"; return; }
            document.getElementById('checkoutForm').style.display="block";
            con.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name} (${item.clean})</span>
                    <button onclick="removeFromCart(${index})" style="background:#ff4757; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">حذف</button>
                </div>
            `).join('');
        }

        function removeFromCart(index) { cart.splice(index, 1); localStorage.setItem('royalCart', JSON.stringify(cart)); updateBadges(); renderCart(); }

        // هذه هي الوظيفة المسؤولة عن شكل الرسالة على واتساب
        function executePurchase() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            if(!name || !phone || !address) { alert("برجاء ملء جميع البيانات لإتمام الطلب ⚠️"); return; }

            // بناء نص الرسالة المنسق
            let orderMsg = `👑 *طلب جديد من رويال فيش* 👑\n\n`;
            orderMsg += `👤 *العميل:* ${name}\n`;
            orderMsg += `📞 *الهاتف:* ${phone}\n`;
            orderMsg += `📍 *العنوان:* ${address}\n\n`;
            orderMsg += `📋 *قائمة المشتريات:*\n`;
            
            cart.forEach((item, index) => {
                orderMsg += `${index + 1}. *${item.name}* \n   [تجهيز: ${item.clean}]\n`;
            });

            orderMsg += `\n--------------------------\n`;
            orderMsg += `✨ *شكراً لاختياركم رويال فيش* ✨`;

            // فتح واتساب بالرسالة المجهزة
            const whatsappNumber = "201006407185"; 
            window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(orderMsg)}`);

            // تصفير السلة بعد النجاح
            cart = []; 
            localStorage.removeItem('royalCart'); 
            updateBadges(); 
            closeAll();
        }

        window.onload = updateBadges;
    </script>
</body>
</html>
