<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال فيش | طعم الملوك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #000000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            font-family: 'Cairo', sans-serif; background-color: var(--dark);
            /* الخلفية هي صورة اللوجو وتتغير مرونتها مع الشاشة */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('royal-fish-text.png.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        header { text-align: center; padding: 5vh 10px; }

        /* اللوجو مرن يكبر ويصغر حسب الشاشة */
        .logo-full {
            width: 80%;
            max-width: 550px; /* أقصى حجم للكمبيوتر */
            height: auto;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            transition: width 0.3s ease;
        }

        .section-title { 
            font-size: clamp(1.8rem, 5vw, 3rem); 
            text-align: center; color: var(--gold); 
            margin: 30px 0; 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
        }

        .categories { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        .category-link { text-decoration: none; color: inherit; }

        .card {
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .card:hover { transform: scale(1.03); border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card h3 { margin: 15px; font-size: 1.6rem; text-shadow: 1px 1px 5px #000; }

        /* تعديلات الموبايل الصغير */
        @media (max-width: 480px) {
            .logo-full { width: 95%; }
            .card img { height: 220px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="royal-fish-text.png.png" alt="Royal Fish" class="logo-full">
    </header>

    <h2 class="section-title">قائمة الملوك</h2>
    
    <div class="categories">
        <a href="shrimp.html" class="category-link">
            <div class="card">
                <img src="shrimp.png.jpeg" alt="جمبري">
                <h3>قسم الجمبري</h3>
            </div>
        </a>
        <a href="tilapia.html" class="category-link">
            <div class="card">
                <img src="tilapia.png.jpeg" alt="بلطي">
                <h3>أسماك النيل</h3>
            </div>
        </a>
        <a href="sea-fish.html" class="category-link">
            <div class="card">
                <img src="sea-fish.png.jpeg" alt="سمك بحر">
                <h3>كنوز البحر</h3>
            </div>
        </a>
        <a href="platters.html" class="category-link">
            <div class="card">
                <img src="platters.png.jpeg" alt="صواني">
                <h3>الولائم الملكية</h3>
            </div>
        </a>
    </div>

</body>
</html>
