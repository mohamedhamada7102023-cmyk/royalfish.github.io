<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال فيش | طعم الملوك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #000000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            font-family: 'Cairo', sans-serif; background-color: var(--dark);
            /* استخدام صورة البراند كخلفية ثابتة للموقع */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('image_4700b7.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        header { text-align: center; padding: 5vh 10px; }

        /* تنسيق صورة البراند لتكون واجهة مرنة */
        .brand-image {
            width: 90%; /* تأخذ معظم العرض في الموبايل */
            max-width: 700px; /* أقصى حجم للكمبيوتر */
            height: auto;
            border-radius: 15px; /* حواف ناعمة للصورة */
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); /* ظل لإبراز الصورة */
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
            transition: transform 0.3s ease;
        }

        .brand-image:hover {
            transform: scale(1.02); /* تأثير حركة بسيط عند الوقوف بالماوس */
        }

        .section-title { 
            font-size: clamp(1.8rem, 5vw, 3rem); 
            text-align: center; color: var(--gold); 
            margin: 40px 0; 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
        }

        .categories { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: 0 auto; padding: 20px;
            padding-bottom: 50px;
        }

        .category-link { text-decoration: none; color: inherit; }

        .card {
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: 0.4s ease;
            text-align: center;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--gold); 
            background: rgba(212, 175, 55, 0.1); 
        }

        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card h3 { margin: 15px; font-size: 1.6rem; text-shadow: 1px 1px 5px #000; }

        /* تعديلات للشاشات الصغيرة جداً */
        @media (max-width: 480px) {
            .brand-image { width: 95%; }
            .card img { height: 220px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="image_4700b7.jpg" alt="Royal Fish Brand" class="brand-image">
    </header>

    <h2 class="section-title">قائمة الملوك</h2>
    
    <div class="categories">
        <a href="shrimp.html" class="category-link">
            <div class="card">
                <img src="shrimp.png.jpeg" alt="جمبري">
                <h3>قسم الجمبري</h3>
            </div>
        </a>
        <a href="tilapia.html" class="category-link">
            <div class="card">
                <img src="tilapia.png.jpeg" alt="بلطي">
                <h3>أسماك النيل</h3>
            </div>
        </a>
        <a href="sea-fish.html" class="category-link">
            <div class="card">
                <img src="sea-fish.png.jpeg" alt="سمك بحر">
                <h3>كنوز البحر</h3>
            </div>
        </a>
        <a href="platters.html" class="category-link">
            <div class="card">
                <img src="platters.png.jpeg" alt="صواني">
                <h3>الولائم الملكية</h3>
            </div>
        </a>
    </div>

</body>
</html>
