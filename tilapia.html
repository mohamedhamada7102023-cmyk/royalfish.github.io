<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الجمبري والفسفور | Royal Fish</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f4f4; margin: 0; color: #001a35; }
        header { background: #001a35; color: white; padding: 30px; text-align: center; border-bottom: 5px solid #d4af37; }
        .back-link { display: inline-block; margin: 20px; text-decoration: none; color: #d4af37; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .fish-item { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .fish-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .price { color: #d4af37; font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
        .order-btn { background: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <h1>قسم الجمبري والفسفور 🦐</h1>
    </header>
    
    <div style="text-align: center;">
        <a href="index.html" class="back-link">← العودة للقائمة الرئيسية</a>
    </div>

    <div class="grid">
        <div class="fish-item">
            <img src="shrimp-jumbo.jpeg" alt="جمبري جامبو">
            <h3>جمبري جامبو سويسي</h3>
            <p>فرز أول، طازج تماماً</p>
            <p class="price">السعر اليومي: حسب الوزن</p>
            <a href="https://wa.me/201006407185?text=أريد%20طلب%20جمبري%20جامبو" class="order-btn">اطلب واتساب</a>
        </div>

        <div class="fish-item">
            <img src="shrimp-medium.jpeg" alt="جمبري وسط">
            <h3>جمبري وسط (مقشر/بقشره)</h3>
            <p>مناسب للقلي والطواجن</p>
            <p class="price">السعر اليومي: حسب الوزن</p>
            <a href="https://wa.me/201006407185?text=أريد%20طلب%20جمبري%20وسط" class="order-btn">اطلب واتساب</a>
        </div>
    </div>
</body>
</html>
